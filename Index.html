<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Code Book</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap');

  :root {
    --bg: #0a0a0a; --surface: #111111; --surface2: #1a1a1a; --border: #222222;
    --accent: #c8a96e; --accent2: #7eb8c8; --text: #e8e8e8; --text-muted: #666;
    --text-dim: #999; --success: #6ec87e;
    --floor1: #c8a96e; --floor2: #7eb8c8; --floor3: #c87e9a;
    --floor4: #9a7ec8; --floor5: #7ec8a9; --floor6: #c8967e; --floor7: #e8d5a0;
  }

  body.light {
    --bg: #f5f2ee; --surface: #ffffff; --surface2: #f0ebe4; --border: #e0d8cf;
    --accent: #a07840; --text: #1a1a1a; --text-dim: #666;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; transition: background 0.3s ease; }

  /* NAVIGATION & LAYOUT */
  .app-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }
  .sidebar { background: var(--surface); border-right: 1px solid var(--border); height: 100vh; position: sticky; top: 0; overflow-y: auto; }
  .main-content { padding: 60px 40px; max-width: 900px; margin: 0 auto; width: 100%; }

  /* XP & SAGE UI */
  .xp-panel { padding: 20px; border-bottom: 1px solid var(--border); }
  .level-bar { height: 4px; background: var(--border); margin-top: 8px; border-radius: 2px; }
  .level-fill { height: 100%; background: var(--accent); transition: width 0.4s ease; }
  .sage-bubble { background: var(--surface2); border-left: 4px solid var(--accent); padding: 25px; margin: 30px 0; border-radius: 0 12px 12px 0; }
  
  /* ANIMATIONS */
  .xp-particle { position: fixed; pointer-events: none; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; z-index: 10000; animation: particle var(--dur) ease-out forwards; }
  @keyframes particle { to { transform: translate(var(--tx), var(--ty)); opacity: 0; } }

  #auth-screen { position: fixed; inset: 0; background: var(--bg); z-index: 10000; display: flex; align-items: center; justify-content: center; text-align: center; }
  .auth-card { max-width: 400px; width: 90%; }
  .auth-btn { width: 100%; padding: 15px; background: var(--accent); border: none; color: black; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 15px; }

  @media (max-width: 768px) { .app-layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
</style>
</head>
<body>
  <div id="auth-screen">
    <div class="auth-card">
      <h1 style="font-family:'Playfair Display'; font-size: 3rem; color:var(--accent);">The Code Book</h1>
      <p style="color:var(--text-dim); margin-bottom: 30px;">All 7 Floors Fully Restored</p>
      <input type="email" placeholder="Email" style="width:100%; padding:12px; background:#222; border:1px solid #444; color:white; border-radius:5px;">
      <button class="auth-btn" onclick="startApp()">ENTER THE BUILDING</button>
    </div>
  </div>

  <div id="app" style="display:none;">
    <div class="app-layout">
      <aside class="sidebar">
        <div class="xp-panel">
          <div style="display:flex; justify-content:space-between; font-family:'IBM Plex Mono'; font-size:12px;">
            <span>LVL <span id="user-level">1</span></span>
            <span id="user-xp">0 XP</span>
          </div>
          <div class="level-bar"><div id="level-fill" class="level-fill" style="width:0%"></div></div>
        </div>
        <div id="nav-list" style="padding:20px;"></div>
      </aside>
      <main class="main-content" id="main-content"></main>
    </div>
  </div>
<script>
const FLOORS = [
  { id: 1, title: "The Foundation", tag: "FLOOR 01", color: "var(--floor1)", sage: "Welcome. Every website starts with a single request. Let's look at the skeleton.", content: "HTML is your structure. Without it, you have no building." },
  { id: 2, title: "Powering Up", tag: "FLOOR 02", color: "var(--floor2)", sage: "Variables are containers for your thoughts. To move the lift, we must define it.", content: "JavaScript variables allow us to store data like floor numbers and user names." },
  { id: 3, title: "Styling Suite", tag: "FLOOR 03", color: "var(--floor3)", sage: "Design is not just what it looks like, but how it works.", content: "CSS turns our gray concrete into a masterpiece." },
  { id: 4, title: "Logic Gates", tag: "FLOOR 04", color: "var(--floor4)", sage: "If this, then that. We are teaching the building to think.", content: "Conditionals guide the flow of your application." },
  { id: 5, title: "Data Vault", tag: "FLOOR 05", color: "var(--floor5)", sage: "Organization is the key to scale.", content: "Arrays and Objects are how we handle massive amounts of user info." },
  { id: 6, title: "The Architect", tag: "FLOOR 06", color: "var(--floor6)", sage: "Functions are your power tools. Build once, use forever.", content: "Reusability is the mark of a master coder." },
  { id: 7, title: "The Mastermind", tag: "FLOOR 07", color: "var(--floor7)", sage: "You have reached the penthouse. The view is yours.", content: "Full-stack development brings everything together." }
];

let state = { xp: 0, level: 1, currentFloor: 1 };

function startApp() {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderNav();
  loadFloor(1);
}

function renderNav() {
  const list = document.getElementById('nav-list');
  list.innerHTML = FLOORS.slice().reverse().map(f => `
    <div onclick="loadFloor(${f.id})" style="padding:10px; cursor:pointer; color:var(--text-dim); font-family:'IBM Plex Mono'; font-size:12px;">
      0${f.id} ${f.title}
    </div>
  `).join('');
}
</script>
<script>
function loadFloor(id) {
  state.currentFloor = id;
  const floor = FLOORS.find(f => f.id === id);
  const main = document.getElementById('main-content');
  
  main.innerHTML = `
    <div style="font-family:'IBM Plex Mono'; color:${floor.color}; letter-spacing:3px; font-size:11px;">${floor.tag}</div>
    <h1 style="font-family:'Playfair Display'; font-size:3.5rem; margin-top:10px;">${floor.title}</h1>
    <div class="sage-bubble">
      <div style="font-family:'IBM Plex Mono'; color:var(--accent); font-size:10px; margin-bottom:8px;">🦉 SAGE</div>
      <p style="color:var(--text); line-height:1.6;">"${floor.sage}"</p>
    </div>
    <div style="color:var(--text-dim); line-height:1.8; font-size:18px;">${floor.content}</div>
    <div style="margin-top:40px; padding:20px; border:1px solid var(--border); border-radius:12px; text-align:center;">
      <p style="margin-bottom:15px; font-family:'IBM Plex Mono'; font-size:12px;">PRACTICE TASK</p>
      <button onclick="earnXP(20, event)" style="padding:10px 30px; background:transparent; border:1px solid var(--accent); color:var(--accent); cursor:pointer;">COMPLETE TASK</button>
    </div>
  `;
}

function earnXP(amount, event) {
  state.xp += amount;
  if(state.xp >= 100) {
    state.level++;
    state.xp = 0;
    alert("LEVEL UP! You are now level " + state.level);
  }
  updateUI();
  spawnParticles(event.clientX, event.clientY);
}

function updateUI() {
  document.getElementById('user-xp').innerText = state.xp + " XP";
  document.getElementById('user-level').innerText = state.level;
  document.getElementById('level-fill').style.width = state.xp + "%";
}

function spawnParticles(x, y) {
  for(let i=0; i<10; i++) {
    const p = document.createElement('div');
    p.className = 'xp-particle';
    p.style.left = x + 'px';
    p.style.top = y + 'px';
    p.style.setProperty('--tx', (Math.random()-0.5)*200 + 'px');
    p.style.setProperty('--ty', (Math.random()-0.5)*200 + 'px');
    p.style.setProperty('--dur', '1s');
    document.body.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}
</script>
</body>
</html>
