<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Code Book</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=IBM+Plex+Mono:wght@300;400;500&family=Lato:wght@300;400;700&display=swap');

        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --accent: #c8a96e;
            --text: #e8e8e8;
            --text-dim: #999;
            --success: #6ec87e;
            --error: #ff5f57;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Lato', sans-serif; }

        /* AUTH SCREEN */
        #auth-screen {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 10000; padding: 20px;
        }
        .auth-card { width: 100%; max-width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 15px; margin: 10px 0; background: var(--surface); border: 1px solid var(--border); color: white; border-radius: 8px; }
        .auth-btn { width: 100%; padding: 15px; background: var(--accent); border: none; font-weight: bold; cursor: pointer; border-radius: 8px; }

        /* APP LAYOUT */
        #app { display: none; }
        .app-layout { display: grid; grid-template-columns: 280px 1fr; min-height: 100vh; }

        /* SIDEBAR */
        .sidebar { background: var(--surface); border-right: 1px solid var(--border); padding: 30px 20px; height: 100vh; position: sticky; top: 0; }
        .floor-link { 
            display: flex; align-items: center; gap: 15px; padding: 12px; 
            cursor: pointer; color: var(--text-dim); font-family: 'IBM Plex Mono'; 
            font-size: 12px; border-radius: 8px; margin-bottom: 5px;
        }
        .floor-link.active { color: var(--accent); background: rgba(200,169,110,0.1); border: 1px solid var(--accent); }

        /* MAIN CONTENT */
        .main-content { padding: 60px 40px; max-width: 800px; margin: 0 auto; }
        .floor-tag { font-family: 'IBM Plex Mono'; color: var(--accent); letter-spacing: 4px; font-size: 11px; }
        h1 { font-family: 'Playfair Display'; font-size: 3rem; margin: 10px 0 20px 0; }
        
        .sage-bubble {
            background: #161616; border-left: 4px solid var(--accent);
            padding: 20px; margin: 30px 0; border-radius: 0 12px 12px 0;
        }

        .mission-box {
            background: #000; border: 1px solid var(--border);
            padding: 40px; border-radius: 16px; text-align: center;
        }
        .dash-btn { background: transparent; border: 1px solid #444; color: white; padding: 10px 20px; cursor: pointer; margin: 5px; font-family: 'IBM Plex Mono'; }

        @media (max-width: 768px) {
            .app-layout { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="auth-card">
            <h1 style="font-family:'Playfair Display'; color:var(--accent); font-style:italic; font-size: 2.5rem;">The Code Book</h1>
            <input type="email" class="auth-input" placeholder="Email">
            <input type="password" class="auth-input" placeholder="Password">
            <button class="auth-btn" onclick="showApp()">SIGN IN</button>
            <p onclick="showApp()" style="margin-top: 20px; font-size: 12px; color: var(--text-dim); cursor: pointer; text-decoration: underline;">Enter as Guest</p>
        </div>
    </div>

    <div id="app">
        <div class="app-layout">
            <aside class="sidebar">
                <div style="font-family:'Playfair Display'; font-size: 22px; color:var(--accent); margin-bottom: 40px;">The Code Book</div>
                <div id="directory">
                    </div>
            </aside>

            <main class="main-content">
                <div id="floor-display">
                    </div>
            </main>
        </div>
    </div>

    <script>
        const floors = [
            { id: 1, name: "THE LOBBY", tag: "FOUNDATION", task: "Welcome to the building.", sage: "I am Sage. I will guide you through the 7 layers of the web." },
            { id: 2, name: "POWERING UP", tag: "VARIABLES", task: "Set the lift variable to 2.", sage: "Variables are like boxes that hold information. Let's fix this elevator." },
            { id: 3, name: "STYLING SUITE", tag: "CSS", task: "Paint the walls gold.", sage: "Structure is nothing without style. Here we learn the art of the layout." },
            { id: 4, name: "LOGIC GATES", tag: "CONDITIONALS", task: "Pass the security check.", sage: "If this, then that. We are teaching the building to make decisions." },
            { id: 5, name: "DATA VAULT", tag: "ARRAYS", task: "Sort the archives.", sage: "A master knows how to handle lists of data without breaking a sweat." },
            { id: 6, name: "THE ARCHITECT", tag: "FUNCTIONS", task: "Build a reusable tool.", sage: "Don't repeat yourself. Build once, use a thousand times." },
            { id: 7, name: "THE MASTERMIND", tag: "DEPLOYMENT", task: "Launch the project.", sage: "You have reached the top. The world is waiting for your code." }
        ];

        function showApp() {
            document.getElementById('auth-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            renderDirectory();
            loadFloor(2); // Start at Floor 2 as per your progress
        }

        function renderDirectory() {
            const dir = document.getElementById('directory');
            dir.innerHTML = floors.slice().reverse().map(f => `
                <div class="floor-link" id="link-${f.id}" onclick="loadFloor(${f.id})">
                    <span>0${f.id}</span> ${f.name}
                </div>
            `).join('');
        }

        function loadFloor(id) {
            const floor = floors.find(f => f.id === id);
            const display = document.getElementById('floor-display');
            
            // Highlight sidebar
            document.querySelectorAll('.floor-link').forEach(l => l.classList.remove('active'));
            document.getElementById(`link-${id}`).classList.add('active');

            display.innerHTML = `
                <div class="floor-tag">FLOOR 0${floor.id} — ${floor.tag}</div>
                <h1>${floor.name}</h1>
                <div class="sage-bubble">
                    <p><strong>Sage:</strong> "${floor.sage}"</p>
                </div>
                <div class="mission-box">
                    <p style="font-family:'IBM Plex Mono'; color:var(--accent); margin-bottom:15px;">MISSION: ${floor.task}</p>
                    ${id === 2 ? `
                        <div id="lift-code" style="font-family:'IBM Plex Mono'; color:var(--error); margin-bottom:20px;">LIFT: OFFLINE</div>
                        <button class="dash-btn" onclick="fixLift()">Set var floor = 2</button>
                    ` : `<p style="color:var(--text-dim)">Floor Content Loading...</p>`}
                </div>
            `;
        }

        function fixLift() {
            const status = document.getElementById('lift-code');
            status.innerText = "LIFT: ONLINE (VAR SET TO 2)";
            status.style.color = "var(--success)";
            alert("Sage: 'Excellent. Floor 2 is now fully powered.'");
        }
    </script>
</body>
</html>
